<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StumbleLabs API - Docs</title>
  
  <!-- Primary Meta Tags -->
  <meta name="title" content="StumbleLabs API - Documentation">
  <meta name="description" content="with examples and schemas.">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://api.stumblelabs.net/docs/">
  <meta property="og:title" content="StumbleLabs API - Public Docs">
  <meta property="og:description" content="with examples and schemas.">
  <meta property="og:image" content="https://avatars.githubusercontent.com/u/137030862?s=400&u=a398977a9fe239be6806583a1454cfcaecd5969b&v=4">
  <meta property="og:image:width" content="400">
  <meta property="og:image:height" content="400">
  <meta property="og:image:alt" content="StumbleLabs API Documentation">
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://api.stumblelabs.net/docs/">
  <meta property="twitter:title" content="StumbleLabs API - Public Docs">
  <meta property="twitter:description" content="with examples and schemas.">
  <meta property="twitter:image" content="https://avatars.githubusercontent.com/u/137030862?s=400&u=a398977a9fe239be6806583a1454cfcaecd5969b&v=4">
  <meta property="twitter:image:alt" content="StumbleLabs API Documentation">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://avatars.githubusercontent.com/u/137030862?s=400&u=a398977a9fe239be6806583a1454cfcaecd5969b&v=4">
  <link rel="apple-touch-icon" href="https://avatars.githubusercontent.com/u/137030862?s=400&u=a398977a9fe239be6806583a1454cfcaecd5969b&v=4">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --theme-color: #42b983;
    }
    /* Hide loading spinner after initial load */
    .loading,
    .sidebar-loading,
    .sidebar .loading {
      transition: opacity 0.3s ease;
    }
    .sidebar .loading[style*="display: none"] {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'StumbleLabs Docs (few endpoints only)',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search...',
        noData: 'No results found!'
      },
      pagination: {
        previousText: '← Previous',
        nextText: 'Next →',
        crossChapter: true,
        crossChapterText: true,
      },
      plugins: [
        function(hook, vm) {
          hook.doneEach(function() {
            // Hide loading spinner after content loads
            setTimeout(function() {
              const loading = document.querySelector('.loading');
              if (loading) {
                loading.style.display = 'none';
              }
              const sidebarLoading = document.querySelector('.sidebar-loading');
              if (sidebarLoading) {
                sidebarLoading.style.display = 'none';
              }
              // Also hide any loading indicators in the sidebar area
              const sidebar = document.querySelector('.sidebar');
              if (sidebar) {
                const sidebarLoaders = sidebar.querySelectorAll('.loading, [class*="loading"]');
                sidebarLoaders.forEach(function(loader) {
                  loader.style.display = 'none';
                });
              }
            }, 100);
          });
        }
      ]
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/copy-code.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
</body>
</html>
